<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI FIRE MDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin:0;
      font-family: Arial;
      background:#0a0a0f;
      color:#ddd;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    .sidebar {
      width:200px;
      background:#111114;
      border-right:1px solid #333;
      padding:10px;
    }

    .logo {
      padding:14px;
      text-align:center;
      background:#1f1f24;
      font-weight:bold;
      color:#ef4444;
      margin-bottom:10px;
    }

    .nav-item {
      padding:12px;
      margin:5px 0;
      cursor:pointer;
      border-radius:5px;
      color:#aaa;
    }

    .nav-item:hover {
      background:#222;
      color:white;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    header {
      background:#1a1a1f;
      padding:10px;
      border-bottom:3px solid #ef4444;
      display:flex;
      justify-content:space-between;
    }

    .content {
      flex:1;
      display:grid;
      grid-template-columns: 2fr 2fr 1.2fr;
      gap:10px;
      padding:10px;
      overflow:hidden;
    }

    .panel {
      background:#1f1f24;
      border:1px solid #333;
      border-radius:6px;
      padding:10px;
      overflow:auto;
    }

    .call-card {
      background:#141418;
      border-left:5px solid #ef4444;
      padding:10px;
      margin:8px 0;
    }

    button, select, input, textarea {
      width:100%;
      margin-top:5px;
      padding:8px;
      background:#222;
      color:#fff;
      border:1px solid #444;
      border-radius:4px;
    }

    button {
      background:#ef4444;
      cursor:pointer;
      font-weight:bold;
    }

    #chatMessages {
      height:70%;
      overflow:auto;
      background:#111;
      padding:8px;
      margin-bottom:10px;
    }

    .dispatch {
      width:260px;
      background:#111114;
      border-left:1px solid #333;
      padding:10px;
    }

    #unitsPage, #chatPage {
      display:none;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">FIRE MDT</div>

  <div class="nav-item" onclick="showCalls()">CALLS</div>
  <div class="nav-item" onclick="showUnits()">UNITS</div>
  <div class="nav-item" onclick="showChat()">CHAT</div>
</div>

<div class="main">

  <header>
    <div>🚒 R6TBSARI FIRE DISPATCH</div>
    <div>LIVE SYNC</div>
  </header>

  <div class="content">

    <div class="panel" id="callsPage">
      <h3>ACTIVE CALLS</h3>
      <div id="activeIncidents"></div>

      <h3>MAP</h3>
      <div id="map" style="height:300px;"></div>
    </div>

    <div class="panel" id="unitsPage">
      <h3>UNITS STATUS</h3>
      <div id="unitsList"></div>
    </div>

    <div class="panel" id="chatPage">
      <h3>UNIT CHAT</h3>

      <div id="chatMessages"></div>

      <input id="chatName" placeholder="Unit Name">
      <input id="chatInput" placeholder="Message">
      <button onclick="sendMessage()">SEND</button>
    </div>

  </div>
</div>

<div class="dispatch">

  <div id="adminBox">
    <h3>DISPATCH LOGIN</h3>
    <input type="password" id="adminPass" placeholder="Password">
    <button onclick="adminLogin()">LOGIN</button>
  </div>

  <div id="dispatchControls" style="display:none;">
    <h3>NEW INCIDENT</h3>

    <select id="callType">
      <option>🔥 Structure Fire</option>
      <option>🚑 Medical</option>
      <option>🚗 MVA</option>
      <option>🛟 Rescue</option>
    </select>

    <input id="address" placeholder="Address">
    <textarea id="details" placeholder="Details"></textarea>

    <button onclick="newCall()">DISPATCH</button>
    <button onclick="logoutAdmin()">LOGOUT</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
