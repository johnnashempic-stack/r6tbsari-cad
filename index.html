<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI FIRE MDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin:0;
      font-family: Arial;
      background:#0a0a0f;
      color:#ddd;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width:200px;
      background:#111114;
      border-right:1px solid #333;
      padding:10px;
    }

    .logo {
      padding:14px;
      text-align:center;
      background:#1f1f24;
      font-weight:bold;
      color:#ef4444;
      margin-bottom:10px;
    }

    .nav-item {
      padding:12px;
      margin:5px 0;
      cursor:pointer;
      border-radius:5px;
      color:#aaa;
    }

    .nav-item:hover {
      background:#222;
      color:white;
    }

    /* MAIN */
    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    header {
      background:#1a1a1f;
      padding:10px;
      border-bottom:3px solid #ef4444;
      display:flex;
      justify-content:space-between;
    }

    /* DESKTOP GRID */
    .content {
      flex:1;
      display:grid;
      grid-template-columns: 2fr 2fr 1.2fr;
      gap:10px;
      padding:10px;
      overflow:hidden;
    }

    .panel {
      background:#1f1f24;
      border:1px solid #333;
      border-radius:6px;
      padding:10px;
      overflow:auto;
    }

    .call-card {
      background:#141418;
      border-left:5px solid #ef4444;
      padding:10px;
      margin:8px 0;
    }

    button, select, input, textarea {
      width:100%;
      margin-top:5px;
      padding:8px;
      background:#222;
      color:#fff;
      border:1px solid #444;
      border-radius:4px;
    }

    button {
      background:#ef4444;
      font-weight:bold;
      cursor:pointer;
    }

    #chatMessages {
      height:70%;
      overflow:auto;
      background:#111;
      padding:8px;
      margin-bottom:10px;
    }

    .dispatch {
      width:260px;
      background:#111114;
      border-left:1px solid #333;
      padding:10px;
    }

    /* MOBILE ONLY */
    @media (max-width: 768px) {

      body {
        flex-direction:column;
        overflow:auto;
      }

      .sidebar {
        width:100%;
        display:flex;
        justify-content:space-around;
      }

      .content {
        display:block;
      }

      .panel {
        display:none;
      }

      .panel.active {
        display:block;
      }

      .dispatch {
        width:100%;
        border-left:none;
        border-top:1px solid #333;
      }

      #map {
        height:250px !important;
      }
    }

  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">FIRE MDT</div>

  <div class="nav-item" onclick="setView('calls')">CALLS</div>
  <div class="nav-item" onclick="setView('units')">UNITS</div>
  <div class="nav-item" onclick="setView('chat')">CHAT</div>
  <div class="nav-item" onclick="setView('history')">HISTORY</div>
</div>

<!-- MAIN -->
<div class="main">

<header>
  <div>🚒 R6TBSARI FIRE MDT</div>
  <div>LIVE CAD SYNC</div>
</header>

<div class="content">

  <!-- CALLS -->
  <div class="panel active" id="callsPage">
    <h3>ACTIVE CALLS</h3>
    <div id="activeIncidents"></div>

    <h3>MAP</h3>
    <div id="map" style="height:300px;"></div>
  </div>

  <!-- UNITS -->
  <div class="panel" id="unitsPage">
    <h3>UNITS</h3>
    <div id="unitsList"></div>
  </div>

  <!-- CHAT -->
  <div class="panel" id="chatPage">
    <h3>CHAT</h3>

    <div id="chatMessages"></div>

    <input id="chatName" placeholder="Unit Name">
    <input id="chatInput" placeholder="Message">
    <button onclick="sendMessage()">SEND</button>
  </div>

  <!-- HISTORY -->
  <div class="panel" id="historyPage">
    <h3>HISTORY</h3>
    <div id="historyList"></div>
  </div>

</div>
</div>

<!-- DISPATCH -->
<div class="dispatch">

  <div id="adminBox">
    <h3>DISPATCH LOGIN</h3>
    <input type="password" id="adminPass">
    <button onclick="adminLogin()">LOGIN</button>
  </div>

  <div id="dispatchControls" style="display:none;">
    <h3>NEW INCIDENT</h3>

    <select id="callType">
      <option>🔥 Structure Fire</option>
      <option>🚑 Medical</option>
      <option>🚗 MVA</option>
      <option>🛟 Rescue</option>
    </select>

    <input id="address" placeholder="Address">
    <textarea id="details" placeholder="Details"></textarea>

    <button onclick="newCall()">DISPATCH</button>
    <button onclick="logoutAdmin()">LOGOUT</button>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
