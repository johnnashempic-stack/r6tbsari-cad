<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rescue Data Terminal</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:monospace;
    background:#0a0a0a;
    color:#00ff66;
    overflow:hidden;
}

header{
    background:#000;
    padding:10px;
    text-align:center;
    border-bottom:3px solid #ffaa00;
    font-weight:bold;
    font-size:18px;
}

.toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:5px;
    padding:6px;
    background:#111;
    border-bottom:2px solid #ffaa00;
}

button{
    background:#003300;
    color:#00ff66;
    border:2px solid #00aa00;
    padding:10px;
    cursor:pointer;
    font-weight:bold;
    min-width:120px;
}

button:hover{
    background:#00aa00;
    color:#000;
}

.container{
    display:flex;
    height:calc(100vh - 220px);
}

.sidebar{
    width:340px;
    background:#111;
    padding:10px;
    overflow-y:auto;
    border-right:3px solid #ffaa00;
}

#map{
    width:100%;
    height:100%;
}

.map{
    flex:1;
}

.log{
    height:120px;
    background:#000;
    padding:8px;
    overflow-y:auto;
    border-top:2px solid #333;
}

/* INCIDENT */
.card{
    border:2px solid #ffaa00;
    margin:10px 0;
    padding:10px;
    background:#1a1a1a;
}

.high{border-color:#ff4444;}

/* MODALS */
.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#111;
    border:3px solid #ffaa00;
    padding:25px;
    text-align:center;
    width:320px;
}

/* UNIT SCREEN */
#unitScreen{
    display:none;
    position:fixed;
    inset:0;
    background:#000;
    justify-content:center;
    align-items:center;
}

.unit-box{
    background:#111;
    border:3px solid #ffaa00;
    padding:30px;
    text-align:center;
}

.unit-btn{
    display:block;
    margin:8px auto;
    width:200px;
}
</style>
</head>

<body>

<header>
RESCUE CAD • ILOILO DISPATCH CENTER
<p id="roleText" style="color:#ffaa00;font-size:12px;">FIELD UNIT</p>

<button onclick="openLogin()" id="loginBtn"
style="position:absolute;right:10px;top:10px;background:#ffaa00;color:#000;">
DISPATCH LOGIN
</button>

<button onclick="logout()" id="logoutBtn"
style="display:none;position:absolute;right:10px;top:10px;background:#aa0000;color:#fff;">
LOGOUT
</button>
</header>

<div class="toolbar">
<button onclick="createCall()">NEW CALL</button>
<button onclick="updateStatus('EN ROUTE')">EN ROUTE</button>
<button onclick="updateStatus('ON SCENE')">ON SCENE</button>
<button onclick="updateStatus('AVAILABLE')">AVAILABLE</button>
<button onclick="openUnitMenu()">SELECT UNIT</button>
</div>

<div class="container">
<div class="sidebar" id="sidebar"></div>
<div class="map"><div id="map"></div></div>
</div>

<div class="log" id="log"></div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-box">
<h3>DISPATCH LOGIN</h3>
<input id="user" placeholder="username" style="width:100%;padding:8px;margin:5px;">
<input id="pass" type="password" placeholder="password" style="width:100%;padding:8px;margin:5px;">
<button onclick="login()">LOGIN</button>
<button onclick="closeLogin()">CANCEL</button>
</div>
</div>

<!-- UNIT SELECTION -->
<div id="unitScreen">
<div class="unit-box">
<h2>SELECT RESCUE UNIT</h2>

<button class="unit-btn" onclick="selectUnit('RESCUE 1')">RESCUE 1</button>
<button class="unit-btn" onclick="selectUnit('RESCUE 2')">RESCUE 2</button>
<button class="unit-btn" onclick="selectUnit('RESCUE 3')">RESCUE 3</button>
<button class="unit-btn" onclick="selectUnit('RESCUE 4')">RESCUE 4</button>
<button class="unit-btn" onclick="selectUnit('RESCUE 5')">RESCUE 5</button>

</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
