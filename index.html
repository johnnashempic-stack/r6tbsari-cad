<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESCUE CAD • ILOILO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:monospace;
    background:#000;
    color:#00ff66;
}

#startScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:9999;
}

.box{
    background:#111;
    border:3px solid #ffaa00;
    padding:30px;
    text-align:center;
}

button{
    padding:12px;
    margin:10px;
    width:220px;
    background:#003300;
    color:#00ff66;
    border:2px solid #00aa00;
    cursor:pointer;
    font-weight:bold;
}

#main{
    display:none;
    height:100vh;
}

#toolbar{
    display:none;
    background:#111;
    padding:8px;
    border-bottom:2px solid #ffaa00;
}

#map{
    height:60vh;
}

#panel{
    height:40vh;
    overflow:auto;
    background:#111;
    padding:10px;
    border-top:2px solid #333;
}
</style>
</head>

<body>

<!-- START -->
<div id="startScreen">
<div class="box">
<h2>RESCUE CAD</h2>

<button onclick="adminLogin()">DISPATCH LOGIN</button>
<button onclick="unitLogin()">UNIT LOGIN</button>

</div>
</div>

<!-- MAIN -->
<div id="main">

<div id="toolbar">
<button onclick="createCall()">NEW CALL</button>
</div>

<div id="map"></div>
<div id="panel"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
