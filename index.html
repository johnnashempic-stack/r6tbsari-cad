<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESCUE CAD • ILOILO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    margin:0;
    font-family:monospace;
    background:#0a0a0a;
    color:#00ff66;
    overflow:hidden;
}

header{
    background:#000;
    padding:10px;
    text-align:center;
    border-bottom:3px solid #ffaa00;
    font-weight:bold;
    position:relative;
}

button{
    background:#003300;
    color:#00ff66;
    border:2px solid #00aa00;
    padding:10px;
    min-width:120px;
    font-weight:bold;
    cursor:pointer;
}

.toolbar{
    display:none;
    padding:6px;
    background:#111;
    border-bottom:2px solid #ffaa00;
}

.container{
    display:none;
    height:calc(100vh - 200px);
}

.sidebar{
    width:340px;
    background:#111;
    padding:10px;
    overflow-y:auto;
    border-right:3px solid #ffaa00;
}

.map{flex:1;}

#map{width:100%;height:100%;}

.log{
    height:120px;
    background:#000;
    padding:8px;
    overflow-y:auto;
    border-top:2px solid #333;
}

/* UNIT SCREEN */
#unitScreen{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    z-index:9999;
}

.unit-box{
    background:#111;
    border:3px solid #ffaa00;
    padding:25px;
    text-align:center;
}

.unit-box button{
    display:block;
    margin:8px auto;
    width:200px;
}
</style>
</head>

<body>

<header>
RESCUE CAD • ILOILO DISPATCH SYSTEM
<p id="roleText">SELECT UNIT</p>

<button onclick="dispatchLogin()" style="position:absolute;right:10px;top:10px;">
DISPATCH LOGIN
</button>
</header>

<!-- UNIT SELECT -->
<div id="unitScreen">
<div class="unit-box">
<h2>SELECT RESCUE UNIT</h2>
<button onclick="selectUnit('RESCUE 1')">RESCUE 1</button>
<button onclick="selectUnit('RESCUE 2')">RESCUE 2</button>
<button onclick="selectUnit('RESCUE 3')">RESCUE 3</button>
<button onclick="selectUnit('RESCUE 4')">RESCUE 4</button>
<button onclick="selectUnit('RESCUE 5')">RESCUE 5</button>
</div>
</div>

<div class="toolbar" id="toolbar">
<button onclick="createCall()">NEW CALL</button>
<button onclick="setStatus('EN ROUTE')">EN ROUTE</button>
<button onclick="setStatus('ON SCENE')">ON SCENE</button>
<button onclick="setStatus('AVAILABLE')">AVAILABLE</button>
</div>

<div class="container" id="main">
<div class="sidebar" id="sidebar"></div>
<div class="map"><div id="map"></div></div>
</div>

<div class="log" id="log"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
