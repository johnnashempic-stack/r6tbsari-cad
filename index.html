<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI CAD / MDT SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ef4444">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    :root {
      --bg: #0a0f1c;
      --panel: #111827;
      --accent: #3b82f6;
      --red: #ef4444;
      --green: #22c55e;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg);
      color: #e5e7eb;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    header {
      background: #0f172a;
      padding: 12px 16px;
      font-size: 1.25em;
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid var(--red);
      flex-shrink: 0;
    }
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .sidebar {
      width: 260px;
      background: var(--panel);
      padding: 12px;
      overflow-y: auto;
      border-right: 1px solid #1e2937;
    }
    .content {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .box {
      background: #1e2937;
      border-radius: 8px;
      padding: 14px;
    }
    .section-title {
      color: var(--accent);
      font-size: 0.95em;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #334155;
      border: 1px solid #475569;
      border-radius: 6px;
      color: white;
      font-size: 1em;
    }
    button {
      width: 100%;
      padding: 14px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 1em;
      cursor: pointer;
    }
    .btn-green { background: var(--green); color: white; }
    .btn-red { background: var(--red); color: white; }
    .unit-item, .incident-item {
      padding: 12px;
      background: #1e2937;
      margin: 6px 0;
      border-radius: 6px;
    }
    .incident-item { cursor: pointer; }
    .status-available { color: #22c55e; }
    .status-responding { color: #eab308; }
    .status-onscene { color: #ef4444; }
    #map { height: 320px; border-radius: 8px; }
  </style>
</head>
<body>

<header>
  <div>🚨 R6TBSARI CAD / MDT SYSTEM</div>
  <div id="mode">👤 Viewer Mode</div>
</header>

<div class="main-container">
  <!-- LEFT: UNIT STATUS -->
  <div class="sidebar">
    <div class="section-title">🚒 UNIT STATUS BOARD</div>
    <div id="unitList"></div>
  </div>

  <!-- CENTER -->
  <div class="content">
    <div class="box">
      <div class="section-title">🔥 ACTIVE INCIDENTS</div>
      <div id="activeIncidents"></div>
    </div>

    <div class="box">
      <div class="section-title">🗺️ INCIDENT MAP</div>
      <div id="map"></div>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="sidebar" style="border-left: 1px solid #1e2937; border-right: none; width: 300px;">
    <div class="box">
      <div class="section-title">👨‍🚒 RESPOND TO ACTIVE</div>
      <input id="callsign" placeholder="Unit Callsign">
      <button onclick="respond()" class="btn-green">MARK AS RESPONDING</button>
    </div>

    <div class="box">
      <div class="section-title">📜 RECENT HISTORY</div>
      <div id="history"></div>
    </div>

    <div class="box" id="adminPanel" style="display:none;">
      <div class="section-title">⚙️ DISPATCH CONTROLS</div>
      <input id="address" placeholder="Address">
      <textarea id="details" rows="3" placeholder="Details"></textarea>
      <button onclick="sendAlert()" style="background:#3b82f6;">🚨 NEW INCIDENT</button>
      <button onclick="raiseAlarm()">🔺 RAISE ALARM</button>
      <button onclick="underControl()">🟡 UNDER CONTROL</button>
      <button onclick="fireOut()" class="btn-red">🔥 FIRE OUT</button>
    </div>

    <button onclick="loginAdmin()" class="btn-red">🔐 Admin Login</button>
  </div>
</div>

<audio id="alarmSound" preload="auto">
  <source src="https://freesound.org/data/previews/66/66930_931655-lq.mp3" type="audio/mpeg">
</audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
