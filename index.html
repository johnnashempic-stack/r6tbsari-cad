<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI MDT - DISPATCH CENTER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ef4444">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: #0a0a0f;
      color: #ddd;
      height: 100vh;
      overflow: hidden;
      display: flex;
    }
    .sidebar { width: 180px; background: #111114; border-right: 1px solid #333; padding-top: 10px; }
    .logo { padding: 15px; text-align: center; background: #1f1f24; font-weight: bold; color: #ef4444; }
    .nav-item { padding: 12px 20px; color: #bbb; cursor: pointer; }
    .nav-item:hover, .nav-item.active { background: #ef4444; color: white; }
    .main { flex: 1; display: flex; flex-direction: column; }
    header {
      background: #1a1a1f;
      padding: 8px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #ef4444;
    }
    .top-row {
      display: flex;
      gap: 8px;
      padding: 10px;
      background: #111114;
      flex-wrap: wrap;
    }
    .panel {
      background: #1f1f24;
      padding: 10px 12px;
      border-radius: 6px;
      border: 1px solid #333;
      min-width: 180px;
    }
    .content {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      gap: 12px;
    }
    .box {
      background: #1f1f24;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 12px;
      flex: 1;
    }
    .map-container { height: 340px; border: 1px solid #444; border-radius: 6px; }

    button {
      background: #ef4444;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      margin: 5px 0;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">R6TBSARI<br><span style="font-size:0.8em;">MDT</span></div>

  <div class="nav-item active">DASHBOARD</div>
  <div class="nav-item">ASSIGNMENT</div>
  <div class="nav-item">SEARCH</div>
  <div class="nav-item">PAPERWORK</div>

  <!-- UNIT BUTTON FIXED -->
  <div class="nav-item" onclick="openUnitPanel()">UNITS</div>

  <div class="nav-item">SUPERVISOR</div>
</div>

<!-- MAIN -->
<div class="main">

  <header>
    <div><strong>🚨 R6TBSARI DISPATCH CENTER</strong></div>
    <div style="color:#22c55e;">ONLINE • REAL-TIME SYNC</div>
  </header>

  <div class="top-row">
    <div class="panel">
      <strong>CURRENT TIME</strong><br>
      <span id="time" style="font-size:1.6em;">--:--</span>
    </div>

    <div class="panel">
      <strong>MY UNIT</strong><br>
      <span style="color:#22c55e;">RESCUE 1 • IN SERVICE</span>
    </div>

    <div class="panel">
      <strong>AVAILABLE UNITS</strong><br>
      <span id="availableCount" style="font-size:1.8em; color:#22c55e;">5</span>
    </div>
  </div>

  <div class="content">

    <div class="box">
      <h3>ACTIVE CALLS</h3>
      <div id="activeIncidents"></div>
    </div>

    <div class="box" style="flex:2;">
      <h3>🗺️ INCIDENT MAP - ILOILO</h3>
      <div id="map" class="map-container"></div>
    </div>

    <div class="box">
      <h3>UNIT STATUS (Quick)</h3>
      <div id="unitList"></div>
    </div>

  </div>
</div>

<!-- ADMIN PANEL -->
<div style="width:280px; background:#111114; padding:12px; border-left:1px solid #333;">
  <div class="box" id="adminPanel" style="display:none;">
    <h3>NEW CALL</h3>

    <select id="callType">
      <option>🔥 Structure Fire</option>
      <option>🚑 Medical Emergency</option>
      <option>🚗 Vehicle Accident</option>
      <option>🛟 Rescue</option>
    </select>

    <input id="address" placeholder="Address">
    <textarea id="details" rows="3" placeholder="Details"></textarea>

    <button onclick="sendAlert()">🚨 DISPATCH CALL</button>
  </div>

  <button onclick="loginAdmin()">🔐 Admin Login</button>
</div>

<!-- UNIT PANEL (NEW FULL SCREEN GUI) -->
<div id="unitPanel" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#0a0a0f;
  z-index:999;
  padding:20px;
  overflow:auto;
">

  <h2>🚓 UNIT MANAGEMENT SYSTEM</h2>
  <button onclick="closeUnitPanel()">⬅ BACK</button>

  <div id="unitPanelList"></div>
</div>

<audio id="alarmSound" preload="auto">
  <source src="https://freesound.org/data/previews/66/66930_931655-lq.mp3">
</audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
