<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI MDT - DISPATCH CENTER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family:Segoe UI;
      background:#0a0a0f;
      color:#ddd;
      height:100vh;
      display:flex;
      overflow:hidden;
    }

    .sidebar {
      width:180px;
      background:#111114;
      border-right:1px solid #333;
      padding-top:10px;
    }

    .logo {
      text-align:center;
      padding:15px;
      background:#1f1f24;
      color:#ef4444;
      font-weight:bold;
    }

    .nav-item {
      padding:12px 15px;
      cursor:pointer;
      color:#bbb;
    }

    .nav-item:hover {
      background:#ef4444;
      color:#fff;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    header {
      background:#1a1a1f;
      padding:10px;
      border-bottom:3px solid #ef4444;
      display:flex;
      justify-content:space-between;
    }

    .content {
      flex:1;
      display:flex;
      gap:10px;
      padding:10px;
    }

    .box {
      background:#1f1f24;
      border:1px solid #333;
      padding:10px;
      flex:1;
      overflow:auto;
    }

    .map {
      height:100%;
      border-radius:6px;
    }

    button {
      background:#ef4444;
      border:none;
      color:#fff;
      padding:8px;
      width:100%;
      margin:5px 0;
      cursor:pointer;
    }

    select, input, textarea {
      width:100%;
      margin:5px 0;
      padding:6px;
      background:#111;
      color:#fff;
      border:1px solid #333;
    }

    #unitPanel, #chatPanel {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#0a0a0f;
      display:none;
      z-index:999;
      padding:15px;
      overflow:auto;
    }

    .panic {
      background:#ff0000;
      margin-top:5px;
    }

    .codeBox {
      display:none;
      background:#111;
      padding:10px;
      border:1px solid #333;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">R6TBSARI<br>MDT</div>
  <div class="nav-item">DASHBOARD</div>
  <div class="nav-item" onclick="openUnitPanel()">UNITS</div>
  <div class="nav-item" onclick="openChat()">UNIT CHAT</div>
</div>

<!-- MAIN -->
<div class="main">
  <header>
    <div>🚨 DISPATCH CENTER</div>
    <div id="time"></div>
  </header>

  <div class="content">
    <div class="box">
      <h3>ACTIVE CALLS</h3>
      <div id="calls"></div>
    </div>

    <div class="box">
      <h3>MAP</h3>
      <div id="map" style="height:100%"></div>
    </div>
  </div>
</div>

<!-- UNIT PANEL -->
<div id="unitPanel">
  <h2>UNIT CONTROL</h2>
  <button onclick="closeUnitPanel()">BACK</button>
  <div id="unitList"></div>
</div>

<!-- CHAT PANEL -->
<div id="chatPanel">
  <h2>UNIT CHAT</h2>
  <button onclick="closeChat()">BACK</button>

  <select id="sender">
    <option>RESCUE 1</option>
    <option>RESCUE 2</option>
    <option>RESCUE 3</option>
    <option>RESCUE 4</option>
    <option>RESCUE 5</option>
  </select>

  <textarea id="msg"></textarea>
  <button onclick="sendMsg()">SEND</button>

  <button onclick="toggleCodes()">10 CODE</button>
  <div class="codeBox" id="codeBox"></div>

  <button class="panic" onclick="panic()">🚨 PANIC</button>

  <div id="chatLog"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
