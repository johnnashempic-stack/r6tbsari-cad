<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI MDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0b0f14;
      color:white;
      display:flex;
      height:100vh;
      overflow:hidden;
    }

    .sidebar{
      width:180px;
      background:#111;
      padding:10px;
    }

    .logo{
      color:red;
      font-weight:bold;
      text-align:center;
      margin-bottom:10px;
    }

    .nav{
      padding:10px;
      cursor:pointer;
      background:#1a1a1a;
      margin:5px 0;
    }

    .nav:hover{background:red;}

    .main{
      flex:1;
      display:flex;
      flex-direction:column;
    }

    header{
      padding:10px;
      background:#111;
      border-bottom:2px solid red;
      display:flex;
      justify-content:space-between;
    }

    .content{
      display:flex;
      flex:1;
    }

    .panel{
      flex:1;
      padding:10px;
      border-right:1px solid #222;
      overflow:auto;
    }

    #map{
      height:100%;
    }

    button{
      width:100%;
      margin:5px 0;
      padding:8px;
      background:red;
      border:none;
      color:white;
    }

    input,textarea,select{
      width:100%;
      padding:6px;
      margin:5px 0;
      background:#111;
      color:white;
      border:1px solid #333;
    }

    .hidden{display:none;}

    #chatPanel{
      position:fixed;
      top:0;left:0;
      width:100%;
      height:100%;
      background:#0b0f14;
      display:none;
      padding:10px;
      overflow:auto;
      z-index:999;
    }

    .codeBox{
      display:none;
      background:#111;
      padding:10px;
      margin:5px 0;
    }
  </style>
</head>

<body>

<div class="sidebar">
  <div class="logo">MDT</div>
  <div class="nav">DASHBOARD</div>
  <div class="nav" onclick="openChat()">UNIT CHAT</div>
</div>

<div class="main">

  <header>
    <div>DISPATCH CENTER</div>
    <div id="time"></div>
  </header>

  <div class="content">

    <div class="panel">
      <h3>ACTIVE CALLS</h3>
      <div id="calls"></div>
    </div>

    <div class="panel">
      <h3>MAP</h3>
      <div id="map"></div>
    </div>

    <div class="panel">
      <h3>DISPATCH</h3>

      <input id="pass" type="password" placeholder="Admin Password">
      <button onclick="login()">LOGIN</button>

      <select id="type">
        <option>Fire</option>
        <option>Medical</option>
        <option>Rescue</option>
      </select>

      <input id="loc" placeholder="Location">
      <textarea id="desc" placeholder="Details"></textarea>

      <button onclick="dispatch()">SEND CALL</button>
    </div>

  </div>
</div>

<!-- CHAT -->
<div id="chatPanel">

  <h2>UNIT CHAT</h2>
  <button onclick="closeChat()">BACK</button>

  <select id="unit">
    <option>RESCUE 1</option>
    <option>RESCUE 2</option>
    <option>RESCUE 3</option>
    <option>RESCUE 4</option>
    <option>RESCUE 5</option>
  </select>

  <textarea id="msg"></textarea>

  <button onclick="sendMsg()">SEND</button>
  <button onclick="toggleCodes()">10 CODE</button>

  <div class="codeBox" id="codes">
    <div onclick="code('10-4 Acknowledged')">10-4</div>
    <div onclick="code('10-17 En route')">10-17</div>
    <div onclick="code('10-20 Location')">10-20</div>
    <div onclick="code('10-50 Accident')">10-50</div>
    <div onclick="code('10-70 Fire')">10-70</div>
  </div>

  <button onclick="panic()" style="background:black;border:2px solid red;">
    🚨 PANIC
  </button>

  <div id="log"></div>
</div>

<audio id="alarm">
  <source src="https://freesound.org/data/previews/250/250629_4486188-lq.mp3">
</audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
