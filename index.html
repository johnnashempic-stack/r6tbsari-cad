<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI MDT - DEPLOYMENT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0a0a0f;
      color: #ddd;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 180px;
      background: #111114;
      border-right: 1px solid #333;
    }

    .logo {
      padding: 15px;
      text-align: center;
      background: #1f1f24;
      color: #ef4444;
      font-weight: bold;
    }

    .nav-item {
      padding: 12px;
      cursor: pointer;
      color: #bbb;
    }

    .nav-item:hover, .nav-item.active {
      background: #ef4444;
      color: white;
    }

    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1f;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      border-bottom: 3px solid #ef4444;
    }

    .content {
      flex: 1;
      display: flex;
      gap: 10px;
      padding: 10px;
      overflow: auto;
    }

    .box {
      flex: 1;
      background: #1f1f24;
      border: 1px solid #444;
      padding: 10px;
      overflow: auto;
    }

    .map {
      height: 300px;
    }

    button {
      background: #ef4444;
      border: none;
      color: white;
      padding: 8px;
      width: 100%;
      margin-top: 5px;
      cursor: pointer;
    }

    input, textarea, select {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
      background: #111;
      color: white;
      border: 1px solid #333;
    }

    /* INCIDENT PANEL */
    #incidentPanel {
      display: none;
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #333;
    }

    .rightPanel {
      width: 220px;
      background: #111114;
      border-left: 1px solid #333;
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">MDT SYSTEM</div>

  <div class="nav-item active">CALLS</div>
  <div class="nav-item">UNITS</div>
  <div class="nav-item">HISTORY</div>
  <div class="nav-item" onclick="toggleChat()">UNIT CHAT</div>

  <!-- CHAT -->
  <div id="chatPanel" style="display:none; padding:10px; border-top:1px solid #333;">
    <h4>UNIT CHAT</h4>

    <select id="chatUnit">
      <option>RESCUE 1</option>
      <option>RESCUE 2</option>
      <option>RESCUE 3</option>
      <option>RESCUE 4</option>
      <option>RESCUE 5</option>
    </select>

    <textarea id="msg"></textarea>
    <button onclick="sendMsg()">SEND</button>

    <div id="log"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <header>
    <div><b>DISPATCH CENTER</b></div>
    <div id="status">ONLINE</div>
  </header>

  <div class="content">

    <!-- CALLS -->
    <div class="box">
      <h3>ACTIVE CALLS</h3>
      <div id="activeIncidents"></div>

      <!-- INCIDENT DETAIL -->
      <div id="incidentPanel">
        <h3>INCIDENT DETAILS</h3>

        <div id="incTime"></div>
        <div id="incAddress"></div>
        <div id="incDesc"></div>

        <h4>RESPONDING</h4>
        <div id="respList"></div>

        <h4>ON SCENE</h4>
        <div id="sceneList"></div>

        <button onclick="closeIncident()">CLOSE</button>
      </div>
    </div>

    <!-- MAP -->
    <div class="box">
      <h3>MAP</h3>
      <div id="map" class="map"></div>
    </div>

  </div>
</div>

<!-- RIGHT PANEL -->
<div class="rightPanel">

  <h3>UNIT STATUS</h3>

  <div>Available: <span id="avail">5</span></div>
  <div>Responding: <span id="resp">0</span></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
