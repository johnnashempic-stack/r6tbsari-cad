<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDT CAD v8</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0c10;
  color:#fff;
  display:flex;
  height:100vh;
}

.sidebar{
  width:210px;
  background:#111319;
  padding:10px;
  border-right:1px solid #2a2a2a;
}

.nav{
  padding:10px;
  margin:6px 0;
  background:#161820;
  cursor:pointer;
}

.main{
  flex:1;
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:10px;
  padding:10px;
}

.panel{
  background:#14161d;
  border:1px solid #2b2b2b;
  padding:10px;
  overflow:auto;
}

.card{
  background:#10121a;
  border-left:4px solid #e63946;
  padding:10px;
  margin:8px 0;
}

.right{
  width:260px;
  background:#111319;
  padding:10px;
  border-left:1px solid #2a2a2a;
}

input,textarea,select,button{
  width:100%;
  margin-top:5px;
  padding:8px;
  background:#1a1c24;
  color:#fff;
  border:1px solid #333;
}

button{
  background:#e63946;
  cursor:pointer;
}

#map{
  height:220px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>🚒 MDT CAD</h3>
  <div class="nav" onclick="view('calls')">CALLS</div>
  <div class="nav" onclick="view('units')">UNITS</div>
  <div class="nav" onclick="view('chat')">CHAT</div>
</div>

<div class="main">

  <div class="panel" id="callsPanel"></div>
  <div class="panel" id="unitsPanel" style="display:none"></div>
  <div class="panel" id="chatPanel" style="display:none"></div>

</div>

<div class="right">

  <h3>DISPATCH LOGIN</h3>
  <input type="password" id="pass">
  <button onclick="login()">LOGIN</button>

  <div id="dispatchUI" style="display:none">

    <h3>NEW CALL</h3>

    <select id="type">
      <option>🔥 Fire</option>
      <option>🚑 Medical</option>
      <option>🛟 Rescue</option>
      <option>🚗 MVA</option>
    </select>

    <input id="address" placeholder="Address">
    <textarea id="details" placeholder="Details"></textarea>

    <button onclick="createCall()">DISPATCH CALL</button>

  </div>

  <div id="map"></div>

</div>

<audio id="alarm">
  <source src="https://freesound.org/data/previews/522/522459_11552799-lq.mp3">
</audio>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
