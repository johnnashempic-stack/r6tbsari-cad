<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI MDT - DISPATCH CENTER</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }
    body {
      margin:0;
      font-family:Segoe UI;
      background:#0a0a0f;
      color:#ddd;
      height:100vh;
      display:flex;
      overflow:hidden;
    }

    .sidebar {
      width:180px;
      background:#111114;
      border-right:1px solid #333;
      padding-top:10px;
    }

    .logo {
      text-align:center;
      padding:15px;
      background:#1f1f24;
      color:#ef4444;
      font-weight:bold;
    }

    .nav-item {
      padding:12px 15px;
      cursor:pointer;
      color:#bbb;
    }

    .nav-item:hover {
      background:#ef4444;
      color:#fff;
    }

    .main {
      flex:1;
      display:flex;
      flex-direction:column;
    }

    header {
      background:#1a1a1f;
      padding:10px;
      border-bottom:3px solid #ef4444;
      display:flex;
      justify-content:space-between;
    }

    .content {
      flex:1;
      display:flex;
      gap:10px;
      padding:10px;
    }

    .box {
      background:#1f1f24;
      border:1px solid #333;
      padding:10px;
      flex:1;
      overflow:auto;
    }

    button {
      background:#ef4444;
      border:none;
      color:#fff;
      padding:8px;
      width:100%;
      margin:5px 0;
      cursor:pointer;
    }

    select, textarea, input {
      width:100%;
      margin:5px 0;
      padding:6px;
      background:#111;
      color:#fff;
      border:1px solid #333;
    }

    #unitChatPanel {
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#0a0a0f;
      display:none;
      z-index:999;
      padding:15px;
      overflow:auto;
    }

    #codePanel {
      display:none;
      background:#111;
      padding:10px;
      border:1px solid #333;
      margin-top:10px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">R6TBSARI<br>MDT</div>

  <div class="nav-item">DASHBOARD</div>
  <div class="nav-item" onclick="openChat()">UNIT CHAT</div>
</div>

<!-- MAIN -->
<div class="main">
  <header>
    <div>🚨 DISPATCH CENTER</div>
    <div id="time"></div>
  </header>

  <div class="content">
    <div class="box">
      <h3>ACTIVE CALLS</h3>
      <div id="calls"></div>
    </div>

    <div class="box">
      <h3>MAP</h3>
      <div id="map" style="height:100%"></div>
    </div>
  </div>
</div>

<!-- PANIC SOUND -->
<audio id="panicSound">
  <source src="https://freesound.org/data/previews/250/250629_4486188-lq.mp3">
</audio>

<!-- UNIT CHAT PANEL -->
<div id="unitChatPanel">

  <h2>UNIT CHAT SYSTEM</h2>
  <button onclick="closeChat()">BACK</button>

  <!-- LOCKED UNITS -->
  <select id="sender">
    <option>RESCUE 1</option>
    <option>RESCUE 2</option>
    <option>RESCUE 3</option>
    <option>RESCUE 4</option>
    <option>RESCUE 5</option>
  </select>

  <textarea id="msg" placeholder="Message"></textarea>
  <button onclick="sendMsg()">SEND</button>

  <button onclick="toggleCodes()">10 CODE</button>

  <div id="codePanel">
    <div onclick="sendCode('10-4 Acknowledged')">10-4 Acknowledged</div>
    <div onclick="sendCode('10-17 En route')">10-17 En route</div>
    <div onclick="sendCode('10-20 Location')">10-20 Location</div>
    <div onclick="sendCode('10-23 Arrived')">10-23 Arrived</div>
    <div onclick="sendCode('10-50 Accident')">10-50 Accident</div>
    <div onclick="sendCode('10-52 Medical')">10-52 Medical</div>
    <div onclick="sendCode('10-70 Fire')">10-70 Fire</div>
  </div>

  <button onclick="panicTrigger()" style="background:red;">🚨 PANIC BUTTON</button>

  <div id="chatLog"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
