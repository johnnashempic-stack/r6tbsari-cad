<!DOCTYPE html>
<html lang="en">
<head>
  <title>R6TBSARI MDT</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ef4444">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial;
      background: #0a0a0f;
      color: #ddd;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 180px;
      background: #111114;
      border-right: 1px solid #333;
    }

    .logo {
      padding: 15px;
      text-align: center;
      color: #ef4444;
      background: #1f1f24;
      font-weight: bold;
    }

    .nav-item {
      padding: 12px;
      cursor: pointer;
      color: #bbb;
    }

    .nav-item:hover {
      background: #ef4444;
      color: white;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a1f;
      padding: 8px;
      border-bottom: 3px solid #ef4444;
      display: flex;
      justify-content: space-between;
    }

    .content {
      flex: 1;
      display: flex;
      gap: 10px;
      padding: 10px;
    }

    .box {
      flex: 1;
      background: #1f1f24;
      padding: 10px;
      overflow: auto;
    }

    .right {
      width: 220px;
      background: #111114;
      padding: 10px;
      border-left: 1px solid #333;
    }

    button {
      width: 100%;
      margin-top: 5px;
      padding: 8px;
      background: #ef4444;
      border: none;
      color: white;
    }

    input, textarea, select {
      width: 100%;
      margin-top: 5px;
      padding: 6px;
      background: #111;
      color: white;
      border: 1px solid #333;
    }

    #incidentPanel {
      display: none;
      margin-top: 10px;
      border: 1px solid #333;
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="logo">MDT SYSTEM</div>

  <div class="nav-item">CALLS</div>
  <div class="nav-item" onclick="toggleUnits()">UNITS</div>
  <div class="nav-item">HISTORY</div>
  <div class="nav-item" onclick="toggleChat()">UNIT CHAT</div>

  <!-- UNITS -->
  <div id="unitsPanel" style="display:none; padding:10px;">
    <h4>UNIT CONTROL</h4>

    <select id="unitSelect">
      <option>RESCUE 1</option>
      <option>RESCUE 2</option>
      <option>RESCUE 3</option>
      <option>RESCUE 4</option>
      <option>RESCUE 5</option>
    </select>

    <button onclick="setStatus('available')">AVAILABLE</button>
    <button onclick="setStatus('responding')">RESPONDING</button>
    <button onclick="setStatus('onscene')">ON SCENE</button>
    <button onclick="setStatus('busy')">BUSY</button>
  </div>

  <!-- CHAT -->
  <div id="chatPanel" style="display:none; padding:10px;">
    <h4>UNIT CHAT</h4>

    <select id="chatUnit">
      <option>RESCUE 1</option>
      <option>RESCUE 2</option>
      <option>RESCUE 3</option>
    </select>

    <textarea id="msg"></textarea>
    <button onclick="sendMsg()">SEND</button>
    <div id="log"></div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <header>
    <div><b>DISPATCH CENTER</b></div>
    <div id="status">OFFLINE</div>
  </header>

  <div class="content">

    <div class="box">
      <h3>ACTIVE CALLS</h3>
      <div id="activeIncidents"></div>

      <div id="incidentPanel">
        <h3>INCIDENT</h3>
        <div id="incTime"></div>
        <div id="incAddress"></div>
        <div id="incDesc"></div>

        <h4>RESPONDING</h4>
        <div id="respList"></div>

        <button onclick="closeIncident()">CLOSE</button>
      </div>
    </div>

    <div class="box">
      <h3>MAP</h3>
      <div id="map" style="height:300px;"></div>
    </div>

  </div>
</div>

<!-- RIGHT -->
<div class="right">

  <!-- ADMIN LOGIN -->
  <div id="adminBox">
    <h3>DISPATCH LOGIN</h3>
    <input type="password" id="adminPass">
    <button onclick="adminLogin()">LOGIN</button>
  </div>

  <!-- DISPATCH -->
  <div id="dispatchControls" style="display:none;">
    <h3>DISPATCH</h3>
    <button onclick="newCall()">NEW CALL</button>
    <button onclick="logoutAdmin()">LOGOUT</button>

    <hr>

    <div>Available: <span id="avail">5</span></div>
    <div>Responding: <span id="resp">0</span></div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
