<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD MDT • ENGINE 1</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    font-family: monospace;
    margin:0;
    background:#0a0a0a;
    color:#00ff66;
    overflow:hidden;
}

header{
    background:#000;
    padding:8px;
    text-align:center;
    border-bottom:4px solid #ffaa00;
    font-size:18px;
    font-weight:bold;
}

.toolbar{
    background:#1a1a1a;
    padding:6px;
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    border-bottom:2px solid #ffaa00;
}

button{
    background:#003300;
    color:#00ff66;
    border:2px solid #00aa00;
    padding:10px 12px;
    cursor:pointer;
    font-family:monospace;
    font-weight:bold;
    min-width:110px;
}

button:hover{ background:#00aa00; color:#000; }

.container{ display:flex; height:calc(100vh - 210px); }

.sidebar{
    width:340px;
    background:#111;
    padding:12px;
    overflow-y:auto;
    border-right:3px solid #ffaa00;
}

.map{ flex:1; }

#map{ width:100%; height:100%; }

.status-bar{
    background:#000;
    padding:8px;
    display:flex;
    justify-content:space-between;
    border-top:3px solid #ffaa00;
}

.log{
    height:130px;
    overflow-y:auto;
    background:#000;
    padding:8px;
    border-top:2px solid #333;
}

.incident-card{
    border:2px solid #ffaa00;
    padding:10px;
    margin:10px 0;
    background:#1a1a1a;
}

.priority-high{ border-color:#ff4444; }

select{
    width:100%;
    padding:6px;
    margin:5px 0;
    background:#222;
    color:#00ff66;
    border:1px solid #555;
}
</style>
</head>

<body>

<header>
FD MDT • ENGINE 1
<p id="role-indicator" style="color:#ffaa00;font-size:12px;">FIELD UNIT</p>

<button onclick="showLogin()" id="login-btn"
style="position:absolute;right:10px;top:8px;background:#ffaa00;color:#000;">
DISPATCH LOGIN
</button>

<button onclick="logout()" id="logout-btn"
style="display:none;position:absolute;right:10px;top:8px;background:#aa0000;color:#fff;">
LOGOUT
</button>
</header>

<div class="toolbar">
<button onclick="createIncident()">NEW CALL</button>
<button onclick="updateStatus('EN ROUTE')">EN ROUTE</button>
<button onclick="updateStatus('ON SCENE')">ON SCENE</button>
<button onclick="updateStatus('AVAILABLE')">AVAILABLE</button>
<button onclick="sendMessage()">RADIO</button>
<button onclick="enterFieldMode()">FIELD MODE</button>
</div>

<div class="container">
<div class="sidebar" id="sidebar"></div>
<div class="map"><div id="map"></div></div>
</div>

<div class="status-bar">
<span>CAD: <b>CONNECTED</b></span>
<span>UNIT: <span id="current-unit">NONE</span></span>
<span>STATUS: <span id="unit-status">IDLE</span></span>
</div>

<div class="log" id="log"></div>

<!-- LOGIN -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.95);justify-content:center;align-items:center;">
<div style="background:#111;padding:40px;border:3px solid #ffaa00;width:360px;text-align:center;">
<h2 style="color:#ffaa00;">DISPATCH ACCESS</h2>

<input id="username" placeholder="Username" style="width:100%;padding:10px;margin:10px 0;">
<input id="password" type="password" placeholder="Password" style="width:100%;padding:10px;margin:10px 0;">

<button onclick="attemptLogin()" style="background:#ffaa00;color:#000;padding:10px;">LOGIN</button>
<button onclick="cancelLogin()" style="background:#333;color:#fff;padding:10px;">CANCEL</button>
</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="app.js"></script>

</body>
</html>
